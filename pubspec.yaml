name: noon_clone
description: Noon Saudi Arabia e-commerce clone with Flutter.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5
  google_fonts: ^8.1.0
  firebase_core: ^4.8.0
  firebase_auth: ^6.5.0
  cloud_firestore: ^6.4.0
  firebase_storage: ^13.4.0
  firebase_messaging: ^16.2.1
  flutter_local_notifications: ^21.0.0
  connectivity_plus: ^7.1.1
  firebase_analytics: ^12.4.0
  firebase_crashlytics: ^5.2.1
  get_it: ^9.2.1
  go_router: ^17.2.3
  shimmer: ^3.0.0
  intl: ^0.20.2
  google_sign_in: ^7.2.0
  shared_preferences: ^2.2.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
